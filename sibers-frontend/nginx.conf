# Nginx config for Vue Router (history mode)
# Конфиг nginx для Vue Router (режим history)
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # All routes fallback to index.html / Все маршруты перенаправляются на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend / Проксируем API запросы к бэкенду
    location /api {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}