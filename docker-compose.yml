services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sibers_mssql
    environment:
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "${DB_PORT}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U ${DB_USER} -P ${DB_PASSWORD} -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - sibers_network
  api:
    build:
      context: .
      dockerfile: SibersProject.API/Dockerfile
    container_name: sibers_api
    environment:
      DB_SERVER: mssql
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_EXPIRES_HOURS: ${JWT_EXPIRES_HOURS}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
    ports:
      - "${API_PORT}:8080"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - sibers_network
  # Vue 3 Frontend / Фронтенд
  frontend:
    build:
      context: ./sibers-frontend
      dockerfile: Dockerfile
    container_name: sibers_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - sibers_network

volumes:
  mssql_data:

networks:
  sibers_network:
    driver: bridge